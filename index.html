<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRcybertech</title>

<style>

body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
text-align:center;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
background:radial-gradient(circle,#00ffff33 0%,transparent 70%);
}

h1{
font-size:70px;
color:#00ffff;
margin-bottom:20px;
}

p{
font-size:22px;
max-width:700px;
line-height:1.7;
color:#cccccc;
}

.btn{
margin-top:40px;
padding:18px 40px;
background:#00ffff;
color:black;
text-decoration:none;
border-radius:12px;
font-weight:bold;
display:inline-block;
}

section{
padding:100px 30px;
max-width:1200px;
margin:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-top:50px;
}

.card{
background:#11182d;
padding:30px;
border-radius:20px;
}

footer{
padding:40px;
border-top:1px solid #222;
color:#777;
}

</style>
</head>

<body>

<header>

<h1>VRCYBERTECH</h1>

<p>
Moderné VR riešenia, 3D simulácie a digitálne technológie budúcnosti.
</p>

<a class="btn" href="#services">Naše služby</a>

</header>

<section id="services">

<h2>Služby</h2>

<div class="cards">

<div class="card">
<h3>VR Development</h3>
<p>Vývoj VR aplikácií a virtuálnych zážitkov.</p>
</div>

<div class="card">
<h3>3D Simulácie</h3>
<p>Interaktívne prostredia pre firmy a gaming.</p>
</div>

<div class="card">
<h3>Cyber Security</h3>
<p>Moderné bezpečnostné riešenia.</p>
</div>

</div>

</section>

<footer>
© 2026 VRCYBERTECH
</footer>

</body>
</html>
